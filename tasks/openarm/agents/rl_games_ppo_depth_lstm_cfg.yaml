params:
  seed: 42

  # environment wrapper clipping
  env:
    clip_observations: 5.0
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: depth_a2c_network
    separate: False

    # Depth encoder resolution (input images are downscaled to this)
    depth_height: 120
    depth_width: 160

    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      units: [512, 512]
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None
    rnn:
      name: lstm
      units: 1024
      layers: 1
      before_mlp: True
      layer_norm: True
      concat_input: True

  load_checkpoint: False
  load_path: ''

  config:
    name: openarm_depth_lstm
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    value_bootstrap: False
    num_actors: -1
    reward_shaper:
      scale_value: 0.01
    normalize_advantage: True
    gamma: 0.998
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: linear
    schedule_type: standard
    kl_threshold: 0.013
    score_to_win: 100000
    max_epochs: 200000
    save_best_after: 100
    save_frequency: 200
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.002
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 16
    minibatch_size: 8192
    mini_epochs: 4
    critic_coef: 4
    clip_value: True
    seq_length: 16
    bound_loss_type: regularization
    bounds_loss_coef: 0.005
    zero_rnn_on_done: True

    central_value_config:
      minibatch_size: 8192
      mini_epochs: 4
      learning_rate: 5e-5
      kl_threshold: 0.016
      clip_value: True
      normalize_input: True
      truncate_grads: True

      network:
        name: actor_critic
        central_value: True
        mlp:
          units: [1024, 512]
          activation: elu
          d2rl: False
          initializer:
            name: default
          regularizer:
            name: None
        rnn:
          name: lstm
          units: 2048
          layers: 1
          before_mlp: False
          layer_norm: True
          concat_input: True
          concat_output: True

    player:
      deterministic: True
      games_num: 100000
      print_stats: True

wandb_activate: True
wandb_group: 'rl_gpu'
wandb_name: 'openarm_depth_teacher'
wandb_entity: 'nvidia'
wandb_project: 'openarm-depth'
wandb_tags: []

hydra:
  output_subdir: null
  run:
    dir: .
